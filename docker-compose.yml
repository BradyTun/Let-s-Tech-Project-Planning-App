# ---------------------------------------------------------------------------
# Production multi-container topology for the Operations Command Center.
# Web (gunicorn) + volume-backed, health-checked PostgreSQL, with strict
# service_healthy boot-ordering so the app never races the database.
# ---------------------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    container_name: hackops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hackops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hackops}
      POSTGRES_DB: ${POSTGRES_DB:-hackops}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hackops} -d ${POSTGRES_DB:-hackops}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - hackops-net

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hackops-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: production
      SECRET_KEY: ${SECRET_KEY:-please-change-me}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-hackops}:${POSTGRES_PASSWORD:-hackops}@db:5432/${POSTGRES_DB:-hackops}
      SEED_ON_BOOT: ${SEED_ON_BOOT:-true}
      ROOT_ADMIN_EMAIL: ${ROOT_ADMIN_EMAIL:-kyawkokotunmm475157@gmail.com}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      USE_SMTP: ${USE_SMTP:-false}
      RESEND_KEY: ${RESEND_KEY:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-Hackathon Planning <no-reply@thespot.solutions>}
      MAIL_SERVER: ${MAIL_SERVER:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 25s
    networks:
      - hackops-net

volumes:
  pgdata:
    driver: local

networks:
  hackops-net:
    driver: bridge
