# ---------------------------------------------------------------------------
# Render Blueprint — one-click deploy with a persistent SQLite database.
#
#   • Builds the web service from the existing Dockerfile; the container
#     entrypoint runs `flask db upgrade` (migrations) on every deploy and
#     seeds once if the DB is empty.
#   • Stores SQLite on a persistent DISK mounted at /var/data, so data
#     survives deploys and restarts. (No external DATABASE_URL needed.)
#   • Generates SECRET_KEY and derives the public URL automatically.
#
# NOTE: Render persistent disks require a paid instance type (Starter or
# higher) and a single instance. On the free plan there is no disk, so SQLite
# would reset on each deploy — use Starter for true persistence.
#
# To deploy: push to GitHub, then in Render choose "New +" → "Blueprint".
# The ONLY value you'll be asked for is RESEND_KEY (a secret, not committed).
# ---------------------------------------------------------------------------

services:
  - type: web
    name: hackathon-planning
    runtime: docker
    region: singapore        # pick the region closest to your team
    plan: starter            # disks require a paid plan; 'free' has no persistent disk
    branch: master           # this repo's code lives on `master`, not `main`
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    # Persistent disk that holds the SQLite database file.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: APP_ENV
        value: production
      # Strong random secret, generated and stored by Render (never in git).
      - key: SECRET_KEY
        generateValue: true
      # Directory for the SQLite file — matches the mounted disk above.
      - key: DATA_DIR
        value: /var/data
      # SQLite is single-writer; keep one gunicorn worker to avoid lock errors.
      - key: GUNICORN_WORKERS
        value: "1"
      # Run migrations every deploy; seed only if the database is empty.
      - key: SEED_ON_BOOT
        value: "true"
      - key: ROOT_ADMIN_EMAIL
        value: kyawkokotunmm475157@gmail.com
      - key: USE_SMTP
        value: "false"
      - key: MAIL_DEFAULT_SENDER
        value: Hackathon <no-reply@thespot.solutions>
      # --- Email (Resend) -------------------------------------------------
      - key: RESEND_KEY
        sync: false
      # SMTP fallback is optional. Set USE_SMTP=true and configure MAIL_*
      # variables in the dashboard if you ever want to switch back.
      # --- Email (Gmail SMTP) ---------------------------------------------
      # - key: MAIL_SERVER
      #   value: smtp.gmail.com
      # - key: MAIL_PORT
      #   value: "587"
      # - key: MAIL_USE_TLS
      #   value: "true"
      # - key: MAIL_USE_SSL
      #   value: "false"
      # - key: MAIL_USERNAME
      #   value: kyawkokotunmm475157@gmail.com
      # - key: MAIL_PASSWORD
      #   sync: false
