<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackathon · Platform</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.snow.css" />
  <script src="https://cdn.jsdelivr.net/npm/quill@2.0.3/dist/quill.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: { extend: {
        fontFamily: { sans: ['Inter', 'sans-serif'] },
        colors: { brand: {
          50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',
          500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81'
        }}
      }}
    }
  </script>
  <style>
    /* High-contrast dark canvas */
    html, body { background:#05070d; color:#e2e8f0; }
    .scroll-thin::-webkit-scrollbar { height: 9px; width: 9px; }
    .scroll-thin::-webkit-scrollbar-thumb { background:#312e81; border-radius: 8px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    /* Full-screen centered API loader — minimal, smart, low-glow */
    #api-loader { position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; background:rgba(5,7,13,.5); backdrop-filter:blur(2px); -webkit-backdrop-filter:blur(2px); opacity:0; pointer-events:none; transition:opacity .18s ease; }
    #api-loader.show { opacity:1; pointer-events:auto; }
    #api-loader .spinner { width:36px; height:36px; border-radius:9999px; border:2.5px solid rgba(148,163,184,.2); border-top-color:#818cf8; animation:api-spin .7s linear infinite; }
    @keyframes api-spin { to { transform:rotate(360deg); } }
    .kanban-col { min-width: 0; }
    .drag-over { background-color: rgba(99,102,241,.12); outline: 2px dashed #6366f1; }
    .surface { background:#0b1020; border-color:#1e2747; }
    .surface-2 { background:#0e1326; border-color:#222c4f; }
    /* Calendar (marketing month view) */
    .cal-cell:hover .cal-add { opacity:1; }
    .cal-add { opacity:0; transition:opacity .15s ease; }
    .cal-chip:hover { filter:brightness(1.18); }
    .cal-cell.drag-over { outline-offset:-2px; }
    /* Rendered markdown (dark) */
    .md-body { font-size: 14px; line-height: 1.7; color:#cbd5e1; }
    .md-body h1 { font-size:1.4em; font-weight:700; margin:.6em 0 .3em; color:#fff; }
    .md-body h2 { font-size:1.2em; font-weight:700; margin:.6em 0 .3em; color:#fff; }
    .md-body h3 { font-size:1.05em; font-weight:600; margin:.5em 0 .3em; color:#f1f5f9; }
    .md-body p { margin:.5em 0; }
    .md-body ul { list-style: disc; padding-left:1.4em; margin:.5em 0; }
    .md-body ol { list-style: decimal; padding-left:1.4em; margin:.5em 0; }
    .md-body li { margin:.2em 0; }
    .md-body code { background:#1e1b4b; color:#c7d2fe; padding:1px 6px; border-radius:6px; font-size:.9em; }
    .md-body pre { background:#020617; color:#e2e8f0; padding:12px 14px; border-radius:10px; overflow-x:auto; border:1px solid #1e293b; }
    .md-body pre code { background:transparent; color:inherit; padding:0; }
    .md-body a { color:#a5b4fc; text-decoration: underline; }
    .md-body blockquote { border-left:3px solid #4338ca; padding-left:12px; color:#94a3b8; }
    .md-body table { border-collapse: collapse; }
    .md-body th, .md-body td { border:1px solid #1e293b; padding:5px 10px; }
    select option { background:#0b1020; }
    /* Quill rich text editor — dark theme */
    .ql-toolbar.ql-snow { border-color:#222c4f; background:#0e1326; border-top-left-radius:10px; border-top-right-radius:10px; }
    .ql-container.ql-snow { border-color:#222c4f; border-bottom-left-radius:10px; border-bottom-right-radius:10px; font-family:'Inter',sans-serif; }
    .ql-editor { background:#0b1020; color:#e2e8f0; min-height:200px; font-size:14px; line-height:1.7; }
    .ql-editor.ql-blank::before { color:#475569; font-style:normal; }
    .ql-snow .ql-stroke { stroke:#cbd5e1; }
    .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill:#cbd5e1; }
    .ql-snow .ql-picker { color:#cbd5e1; }
    .ql-snow .ql-picker-options { background:#0e1326; border-color:#222c4f !important; }
    .ql-snow.ql-toolbar button:hover .ql-stroke, .ql-snow.ql-toolbar button.ql-active .ql-stroke,
    .ql-snow.ql-toolbar .ql-picker-label:hover .ql-stroke { stroke:#a5b4fc; }
    .ql-snow.ql-toolbar button:hover .ql-fill, .ql-snow.ql-toolbar button.ql-active .ql-fill { fill:#a5b4fc; }
    .ql-snow.ql-toolbar button:hover, .ql-snow.ql-toolbar button.ql-active,
    .ql-snow .ql-picker-label.ql-active, .ql-snow .ql-picker-item.ql-selected { color:#a5b4fc; }
    .ql-editor a { color:#a5b4fc; }
    .ql-editor blockquote { border-left:3px solid #4338ca; color:#94a3b8; }
    .ql-editor pre, .ql-editor pre.ql-syntax { background:#020617; color:#e2e8f0; border:1px solid #1e293b; }
    .ql-snow .ql-tooltip { background:#0e1326; border-color:#222c4f; color:#e2e8f0; box-shadow:0 8px 24px rgba(0,0,0,.5); border-radius:8px; }
    .ql-snow .ql-tooltip input[type=text] { background:#0b1020; border-color:#334155; color:#e2e8f0; }
    /* Task modal editor fills the available pane height; only the text body scrolls */
    .task-editor .ql-toolbar.ql-snow { flex:0 0 auto; }
    .task-editor .ql-container.ql-snow { flex:1 1 auto; min-height:0; overflow-y:auto; }
    .task-editor .ql-editor { min-height:100%; }
    .ql-snow .ql-tooltip a.ql-action, .ql-snow .ql-tooltip a.ql-remove { color:#a5b4fc; }
  </style>
</head>
<body class="font-sans antialiased">

  <script>
    window.OPS_META = {
      taskStates: {{ task_states | tojson }},
      stakeholderRoles: {{ stakeholder_roles | tojson }},
      stakeholderRoleGroups: {{ stakeholder_role_groups | tojson }},
      stakeholderStatuses: {{ stakeholder_statuses | tojson }},
      userRoles: {{ user_roles | tojson }},
      communityMeta: {{ community_meta | tojson }},
      selectionCap: {{ selection_cap | tojson }},
      me: {{ current_user.to_dict() | tojson }}
    };
  </script>

  <div class="flex h-screen overflow-hidden">

    <!-- ================= SIDEBAR ================= -->
    <aside class="w-72 shrink-0 border-r surface flex flex-col">
      <div class="px-5 py-5 border-b border-slate-800/80">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-xl bg-brand-500 flex items-center justify-center text-white shadow-lg shadow-brand-500/40">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h7l-1 8 10-12h-7l1-8z"/></svg>
          </div>
          <div>
            <p class="text-sm font-extrabold leading-tight text-white">Hackathon</p>
            <p class="text-[11px] text-slate-500">Platform</p>
          </div>
        </div>
      </div>

      <div class="px-4 pt-4 flex items-center justify-between">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Epics</span>
        <button onclick="OPS.openModal('project')" class="text-brand-300 hover:text-brand-200 text-xs font-semibold">+ New</button>
      </div>

      <nav id="project-list" class="flex-1 overflow-y-auto scroll-thin px-3 py-3 space-y-1"></nav>

      <div class="px-4 pt-3 border-t border-slate-800/80">
        <span class="text-[11px] font-bold uppercase tracking-wider text-slate-500">Program</span>
      </div>
      <div class="px-3 py-2 space-y-0.5">
        <button data-section="milestones" onclick="OPS.openSection('milestones')" class="section-btn w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2 rounded-lg px-2 py-1.5">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#128506;</span> <span>Milestones</span>
        </button>
        <button data-section="participants" onclick="OPS.openSection('participants')" class="section-btn w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2 rounded-lg px-2 py-1.5">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#127919;</span> <span>Participants</span>
        </button>
        <button data-section="teams" onclick="OPS.openSection('teams')" class="section-btn w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2 rounded-lg px-2 py-1.5">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#129309;</span> <span>Teams</span>
        </button>
        <button data-section="partners" onclick="OPS.openSection('partners')" class="section-btn w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2 rounded-lg px-2 py-1.5">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#127970;</span> <span>Stakeholders</span>
        </button>
      </div>

      <div class="px-4 py-3 border-t border-slate-800/80 space-y-2">
        <button id="btn-docs" onclick="OPS.openModal('docs')" class="w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#128196;</span> <span>Docs</span>
        </button>
        <button id="btn-team" onclick="OPS.openModal('team')" class="w-full text-left text-xs font-medium text-slate-400 hover:text-brand-200 flex items-center gap-2">
          <span class="h-6 w-6 rounded-md surface-2 border flex items-center justify-center">&#128101;</span> <span id="team-label">Team</span>
        </button>
        <div id="team-count" class="text-[11px] text-slate-600 pl-8"></div>
      </div>

      <!-- User chip -->
      <div class="px-4 py-3 border-t border-slate-800/80">
        <div class="flex items-center gap-3">
          <span class="h-9 w-9 rounded-full bg-brand-500 text-white text-xs font-bold flex items-center justify-center">{{ current_user.display_name[:2] | upper }}</span>
          <div class="min-w-0 flex-1">
            <p class="text-sm font-semibold text-white truncate">{{ current_user.display_name }}</p>
            <p class="text-[11px] text-slate-500 truncate">{{ current_user.role.value | capitalize }}{% if current_user.is_admin %} · admin{% endif %}</p>
          </div>
          <button onclick="OPS.logout()" title="Sign out" class="text-slate-500 hover:text-rose-400 p-1.5 rounded-lg hover:bg-slate-800/60">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ================= MAIN ================= -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <header class="border-b border-slate-800/80 surface px-8 py-4 flex items-center justify-between gap-4">
        <div class="flex items-center gap-2 min-w-0">
          <div class="min-w-0">
            <div class="flex items-center gap-2">
              <h1 id="project-title" class="text-xl font-bold text-white truncate">Select an epic</h1>
              <button id="epic-edit-btn" onclick="OPS.openModal('epicEdit')" title="Epic settings" class="hidden text-slate-500 hover:text-brand-200 p-1 rounded-md hover:bg-slate-800/60">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
              </button>
            </div>
            <p id="project-subtitle" class="text-sm text-slate-500 mt-0.5 truncate">—</p>
          </div>
        </div>
        <div id="epic-actions" class="flex items-center gap-2 shrink-0">
          <div class="flex items-center rounded-lg border border-slate-700 p-0.5 surface-2 mr-1">
            <button id="view-board" onclick="OPS.setView('board')" class="px-3 py-1.5 rounded-md text-xs font-semibold bg-brand-500 text-white">Board</button>
            <button id="view-calendar" onclick="OPS.setView('calendar')" class="px-3 py-1.5 rounded-md text-xs font-semibold text-slate-400 hover:text-slate-200">Calendar</button>
            <button id="view-overview" onclick="OPS.setView('overview')" class="px-3 py-1.5 rounded-md text-xs font-semibold text-slate-400 hover:text-slate-200">Overview</button>
          </div>
          <div id="blocked-banner" class="hidden items-center gap-2 px-3 py-1.5 rounded-lg bg-rose-500/15 text-rose-300 text-xs font-semibold border border-rose-500/30">
            <span class="h-2 w-2 rounded-full bg-rose-400 animate-pulse"></span>
            <span id="blocked-count">0</span> blocked
          </div>
          <button onclick="OPS.openSection('partners')" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800/70 border border-slate-700">Stakeholders</button>
          <button onclick="OPS.openModal('sprintManage')" class="px-3 py-2 rounded-lg text-sm font-medium text-slate-300 hover:bg-slate-800/70 border border-slate-700">Sprints</button>
          <button onclick="OPS.openModal('task')" class="px-4 py-2 rounded-lg text-sm font-semibold text-white bg-brand-500 hover:bg-brand-400 shadow-lg shadow-brand-500/30">+ New Task</button>
        </div>
      </header>

      <div id="board-controls" class="border-b border-slate-800/80 surface px-8 py-3 flex items-center gap-4">
        <div id="sprint-tabs" class="flex items-center gap-2 overflow-x-auto scroll-thin"></div>
        <div class="ml-auto flex items-center gap-3">
          <select id="stakeholder-filter" onchange="OPS.applyFilter()" class="text-sm border border-slate-700 rounded-lg px-3 py-1.5 surface-2 text-slate-300 focus:ring-2 focus:ring-brand-500 focus:border-brand-500">
            <option value="">All stakeholders</option>
          </select>
        </div>
      </div>

      <div id="board-view" class="flex-1 overflow-hidden px-8 py-6">
        <div id="kanban" class="flex gap-4 h-full"></div>
        <div id="empty-state" class="hidden h-full flex-col items-center justify-center text-center">
          <div class="h-16 w-16 rounded-2xl bg-brand-500/10 border border-brand-500/30 flex items-center justify-center text-brand-300 text-3xl mb-4">◷</div>
          <p class="text-slate-300 font-medium">No sprint selected</p>
          <p class="text-slate-500 text-sm mt-1">Create a sprint to start planning.</p>
        </div>
      </div>

      <div id="overview-view" class="hidden flex-1 overflow-y-auto scroll-thin px-8 py-6"></div>
      <div id="calendar-view" class="hidden flex-1 overflow-hidden px-8 py-5 flex flex-col"></div>
      <div id="program-view" class="hidden flex-1 overflow-y-auto scroll-thin px-8 py-6"></div>
    </main>
  </div>

  <!-- ================= MODAL HOST ================= -->
  <div id="modal-host" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="OPS.closeModal()"></div>
    <div id="modal-card" class="relative surface border rounded-2xl shadow-2xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto scroll-thin text-slate-200"></div>
  </div>

  <div id="toast" class="hidden fixed bottom-6 right-6 z-[60] px-4 py-3 rounded-xl shadow-xl text-sm font-medium"></div>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
